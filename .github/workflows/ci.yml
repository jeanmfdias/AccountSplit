name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    env:
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, intl, ctype, iconv
          tools: composer:v2

      - name: Create .env file
        working-directory: backend
        run: cp .env.example .env

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Warm up Symfony cache
        working-directory: backend
        run: php bin/console cache:warmup --env=test

      - name: Run PHPUnit
        working-directory: backend
        run: vendor/bin/phpunit --no-coverage

  stan:
    name: PHPStan
    runs-on: ubuntu-latest

    env:
      APP_ENV: dev
      DATABASE_URL: "sqlite:////tmp/account_split.db"

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, intl, ctype, iconv
          tools: composer:v2

      - name: Create .env file
        working-directory: backend
        run: cp .env.example .env

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Warm up Symfony cache (dev)
        working-directory: backend
        run: php bin/console cache:warmup --env=dev

      - name: Run PHPStan
        working-directory: backend
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

  lint:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, intl, ctype, iconv
          tools: composer:v2

      - name: Create .env file
        working-directory: backend
        run: cp .env.example .env

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHP CS Fixer (dry-run)
        working-directory: backend
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes
