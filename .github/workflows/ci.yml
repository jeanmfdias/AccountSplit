name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: account_split_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://app:secret@127.0.0.1:5432/account_split_test?serverVersion=17&charset=utf8

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, intl, ctype, iconv
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env file
        working-directory: backend
        run: cp .env.example .env

      - name: Warm up Symfony cache
        working-directory: backend
        run: php bin/console cache:warmup --env=test

      - name: Run database migrations
        working-directory: backend
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run PHPUnit
        working-directory: backend
        run: vendor/bin/phpunit --no-coverage

  stan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, intl, ctype, iconv
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env file
        working-directory: backend
        run: cp .env.example .env

      - name: Warm up Symfony cache (dev)
        working-directory: backend
        env:
          APP_ENV: dev
          DATABASE_URL: postgresql://app:secret@127.0.0.1:5432/account_split?serverVersion=17&charset=utf8
        run: php bin/console cache:warmup --env=dev

      - name: Run PHPStan
        working-directory: backend
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

  lint:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, intl, ctype, iconv
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env file
        working-directory: backend
        run: cp .env.example .env

      - name: Run PHP CS Fixer (dry-run)
        working-directory: backend
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes